name: Docs

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  dokka:
    name: Generate Dokka HTML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Generate Dokka HTML
        run: ./gradlew :core:dokkaGeneratePublicationHtml --no-daemon --stacktrace

      - name: Upload Dokka HTML artifact
        uses: actions/upload-artifact@v4
        with:
          name: dokka-html
          path: core/build/dokka/html/
          retention-days: 7
