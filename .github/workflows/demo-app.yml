name: Demo App

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # NOT triggered on version tags — release.yml handles tags.
  # demo-app build failures block PRs but do NOT block release.yml (OQ-3 RESOLVED).

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-jvm-android:
    name: Build (JVM + Android)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Build demo-app:androidApp (assembleDebug)
        run: ./gradlew :demo-app:androidApp:assembleDebug --no-daemon --stacktrace

      - name: Build demo-app:desktopApp (assemble)
        run: ./gradlew :demo-app:desktopApp:assemble --no-daemon --stacktrace

      # -----------------------------------------------------------------------
      # AC10 exclusion verifications — confirm demo-app does not pollute :core
      # -----------------------------------------------------------------------

      - name: Verify — :core:apiCheck still green (demo-app excluded from ABI check)
        run: ./gradlew :core:apiCheck --no-daemon

      - name: Verify — :core:koverVerify still at 100% (demo-app excluded from coverage)
        run: ./gradlew :core:koverVerify --no-daemon

      - name: Verify — publishToMavenLocal produces only :core artifacts
        # AC10 exclusion guard. Pass empty signingInMemoryKey explicitly so
        # mavenPublishing's conditional signAllPublications() (in
        # core/build.gradle.kts) skips signing — CI has no GPG creds (those
        # only exist in release.yml's secrets injection). The intent is to
        # enumerate which modules publish, not to sign artifacts.
        #
        # Vanniktech KMP publishing emits one directory per Kotlin target:
        #   core/                           — kotlinMultiplatform BOM
        #   core-jvm/                       — JVM variant
        #   core-iosarm64/                  — iOS device
        #   core-iossimulatorarm64/         — iOS simulator (Apple Silicon)
        #   core-iosx64/                    — iOS simulator (Intel)
        # All five are legitimate :core artifacts. The invariant we want to
        # enforce is: every directory under io/github/kotindia/ must start
        # with 'core' (anything else = a demo-app module leaked).
        run: |
          ./gradlew publishToMavenLocal --no-daemon -PsigningInMemoryKey=
          UNEXPECTED=$(find ~/.m2/repository/io/github/kotindia -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | grep -vE '^core(-[a-z0-9]+)?$' || true)
          if [[ -n "$UNEXPECTED" ]]; then
            echo "FAIL: Unexpected Maven publications found under io/github/kotindia/:"
            echo "$UNEXPECTED"
            exit 1
          fi
          echo "OK: Only :core artifacts present in Maven Local:"
          find ~/.m2/repository/io/github/kotindia -mindepth 1 -maxdepth 1 -type d -printf '  - %f\n'

  build-ios-framework:
    name: Build (iOS Framework)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Link iOS Simulator framework
        # Verifies Kotlin/Native compilation for iosSimulatorArm64 (M-series Mac CI runner).
        # Actual Xcode build is verified locally by Sandeep — Xcode project deferred to Slice 13b.
        run: ./gradlew :demo-app:shared:linkDebugFrameworkIosSimulatorArm64 --no-daemon --stacktrace
