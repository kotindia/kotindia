name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      # Scoped to :core only — the demo-app modules are exercised by the
      # dedicated `Demo App` workflow (.github/workflows/demo-app.yml). Running
      # root `check` here would also run AndroidX/Compose lint detectors against
      # the demo-app, which crash with IncompatibleClassChangeError under AGP 9
      # until the upstream lint artifacts ship a fix. Library-side gates live
      # entirely in :core.
      - name: Run :core:check (compile + test + lint + koverVerify + apiCheck + enforceZeroDeps)
        run: ./gradlew :core:check --no-daemon --stacktrace

      - name: Run :core:apiCheck
        run: ./gradlew :core:apiCheck --no-daemon

      - name: Generate Kover HTML report
        run: ./gradlew :core:koverHtmlReport --no-daemon
        if: matrix.os == 'ubuntu-latest'

      - name: Upload Kover coverage report
        uses: actions/upload-artifact@v4
        if: matrix.os == 'ubuntu-latest'
        with:
          name: kover-report
          path: core/build/reports/kover/html/
          retention-days: 7
